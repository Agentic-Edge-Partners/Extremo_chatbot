# Local development docker-compose
# For production (AWS), replace postgres/redis with:
#   - AWS RDS (PostgreSQL): set POSTGRES_URI to your RDS endpoint
#   - AWS ElastiCache (Redis): set REDIS_URI to your ElastiCache endpoint
#   - AWS ECS (Fargate) or EC2: run backend + frontend containers

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langgraph
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8123:8000"
    env_file:
      - .env
    environment:
      POSTGRES_URI: postgres://langgraph:langgraph@postgres:5432/langgraph
      REDIS_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
        NEXT_PUBLIC_ASSISTANT_ID: agent
    ports:
      - "3000:3000"
    environment:
      LANGGRAPH_API_URL: ${LANGGRAPH_API_URL:-http://backend:8000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
